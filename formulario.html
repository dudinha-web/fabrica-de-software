<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles/index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <title>Formulário de Denúncia</title>
  </head>
  <body>
    <header>
      <div class="logomarca">
        <img src="/img/logomarca-univille.png" alt="Logomarca Univille" />
      </div>

      <div class="menu-toggle" id="menu-toggle">
        <img src="/img/menu-hamburguer.svg" alt="Menu" />
      </div>

      <div class="header-menu" id="menu">
        <a href="/">início</a>
        <a href="/#descarte">como realizar o descarte</a>
        <a href="/formulario.html">denuncie um descarte inadequado</a>
        <a href="/#contato">entre em contato</a>
      </div>
    </header>

    <section class="formulario-de-denuncia">
      <div class="overlay"></div>
      <h1>Denúncia de Descarte Irregular</h1>
    </section>

    <section class="conteudo-formulario">
      <form class="conteudo-formulario-container" id="formDenuncia">
        <span>*Esta denúncia será anônima</span>

        <input type="text" placeholder="Qual o tipo de resíduo?" />
        <input type="text" placeholder="Qual o endereço do ocorrido?" />

        <textarea placeholder="Mensagem:"></textarea>

        <input type="file" />

        <button type="submit">Enviar</button>

      </form>
    </section>

    <footer>
      <img src="/img/logomarca-univille.png" alt="Logomarca Univille" />
      <ul class="footer-contacts">
        <li class="footer-contact-item">
          <a href="https://maps.app.goo.gl/2gzZx7MdvqfqjLA89" target="_blank"
            ><img
              src="/img/location-footer-icon.svg"
              alt="Ícone de Localização"
            />R. Paulo Malschitzki</a
          >
        </li>
        <li class="footer-contact-item">
          <a href="tel:+554734619000"
            ><img
              src="/img/phone-footer-icon.svg"
              alt="Ícone de Telefone"
            />(47) 3461-9000</a
          >
        </li>
        <li class="footer-contact-item">
          <a href="mailto:univille@univille.br" target="_blank"
            ><img
              src="/img/email-footer-icon.svg"
              alt="Ícone de Email"
            />univille@univille.br</a
          >
        </li>
        <li class="footer-contact-item">
          <a href="https://www.instagram.com/univille/" target="_blank"
            ><img
              src="/img/insta-footer-icon.svg"
              alt="Ícone do Instagram"
            />@univille</a
          >
        </li>
      </ul>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
